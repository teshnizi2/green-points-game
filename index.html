<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ================ SOUND ENGINE (Web Audio, no files) ================ */

const SoundFX = (() => {
  let ctx = null;
  let masterGain = null;
  let muted = false;

  const ensure = () => {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.6;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };

  const tone = (freq, dur, type, vol, delay = 0) => {
    if (muted) return;
    const c = ensure(); if (!c) return;
    const t0 = c.currentTime + delay;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(masterGain);
    o.start(t0);
    o.stop(t0 + dur + 0.05);
  };

  const glide = (f1, f2, dur, type, vol, delay = 0) => {
    if (muted) return;
    const c = ensure(); if (!c) return;
    const t0 = c.currentTime + delay;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f1, t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(f2, 30), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(masterGain);
    o.start(t0);
    o.stop(t0 + dur + 0.05);
  };

  const noiseSweep = (dur, vol, fStart, fEnd) => {
    if (muted) return;
    const c = ensure(); if (!c) return;
    const t0 = c.currentTime;
    const len = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, len, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = c.createBufferSource(); src.buffer = buf;
    const filt = c.createBiquadFilter();
    filt.type = 'bandpass';
    filt.Q.value = 4;
    filt.frequency.setValueAtTime(fStart, t0);
    filt.frequency.exponentialRampToValueAtTime(Math.max(fEnd, 60), t0 + dur);
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt).connect(g).connect(masterGain);
    src.start(t0);
  };

  return {
    // Tiny UI feedback
    click:   () => tone(760, 0.07, 'triangle', 0.12),
    back:    () => glide(520, 340, 0.14, 'triangle', 0.1),
    pop:     () => tone(640, 0.08, 'sine', 0.1),
    // Sorting game
    correct: (streak = 1) => {
      const base = 523.25; // C5
      const bump = Math.min(streak - 1, 5) * 60;
      tone(base + bump,      0.12, 'sine',     0.14);
      tone((base + bump)*1.25,0.18, 'triangle', 0.11, 0.09);  // major third up
    },
    wrong:   () => {
      tone(220, 0.14, 'sawtooth', 0.09);
      tone(174, 0.22, 'sawtooth', 0.08, 0.09);
    },
    // Earning / deposit
    coin:    () => {
      tone(987.77,  0.09, 'square',  0.1);       // B5
      tone(1318.51, 0.20, 'triangle', 0.1, 0.07); // E6
    },
    coinBig: () => {
      tone(659.25,  0.1, 'square', 0.09);
      tone(987.77,  0.1, 'square', 0.09, 0.07);
      tone(1318.51, 0.25, 'triangle', 0.11, 0.14);
    },
    // Transitions
    whoosh:  () => noiseSweep(0.28, 0.08, 2400, 380),
    swoopUp: () => glide(220, 660, 0.22, 'triangle', 0.08),
    // Celebrations
    confetti: () => {
      [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) =>
        tone(f, 0.28, 'triangle', 0.1, i * 0.07)
      );
    },
    win: () => {
      // Major triad arpeggio → shimmer
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((f, i) => tone(f, 0.32, 'triangle', 0.12, i * 0.1));
      tone(1567.98, 0.5, 'sine', 0.08, 0.5);
    },
    chime: () => {
      // Gentle 3-note welcome chord
      tone(523.25, 0.6, 'sine', 0.08);
      tone(659.25, 0.6, 'sine', 0.08, 0.14);
      tone(783.99, 0.8, 'sine', 0.09, 0.28);
    },
    sparkle: () => {
      const c = ensure(); if (!c || muted) return;
      [1760, 2093, 2637, 3136].forEach((f, i) =>
        tone(f, 0.12, 'sine', 0.05, i * 0.04)
      );
    },
    setMuted: (m) => {
      muted = !!m;
      if (masterGain && ctx) masterGain.gain.value = muted ? 0 : 0.6;
    },
    isMuted: () => muted,
    unlock:  () => { ensure(); },
  };
})();

/* ================ VISUAL FEEDBACK BUS ================ */

// Simple pub/sub so any scene can emit a floating gain, coin shower, or a
// centered burst popup without needing prop-drilling.
const FxBus = (() => {
  const topics = { gain: [], coins: [], burst: [] };
  const on  = (k, fn) => { topics[k].push(fn); return () => { topics[k] = topics[k].filter(f => f !== fn); }; };
  const emit = (k, payload) => topics[k].forEach(fn => fn(payload));
  return {
    onGain:  (fn) => on('gain', fn),
    onCoins: (fn) => on('coins', fn),
    onBurst: (fn) => on('burst', fn),
    gain:  (p) => emit('gain', p),
    coins: (p) => emit('coins', p),
    burst: (p) => emit('burst', p),
  };
})();

// Helper to fire a floating "+€1.00" style popup near an element (or at % coords)
function pingGain({ text, tone = 'money', emoji, xPct = 50, yPct = 50, delay = 0 }) {
  setTimeout(() => FxBus.gain({ id: Math.random(), text, tone, emoji, xPct, yPct }), delay);
}

/* ================ FLOATING GAINS LAYER ================ */

function FloatingGainsLayer() {
  const [items, setItems] = useState([]);
  useEffect(() => FxBus.onGain((g) => {
    setItems(s => [...s, g]);
    setTimeout(() => setItems(s => s.filter(i => i.id !== g.id)), 2400);
  }), []);
  const toneClass = (tone) => {
    if (tone === 'money')  return 'from-brand-500 to-brand-700';
    if (tone === 'points') return 'from-warm-300 to-warm-500';
    if (tone === 'planet') return 'from-emerald-500 to-brand-700';
    return 'from-brand-500 to-brand-700';
  };
  return (
    <div className="fixed inset-0 pointer-events-none z-[65]">
      {items.map(it => (
        <div
          key={it.id}
          className="absolute gain-rise"
          style={{ left: it.xPct + '%', top: it.yPct + '%' }}
        >
          <div className={`bg-gradient-to-br ${toneClass(it.tone)} text-white font-display font-black big-num text-2xl md:text-3xl px-4 py-2 rounded-2xl shadow-2xl flex items-center gap-1.5 whitespace-nowrap`}>
            {it.emoji && <span className="text-2xl">{it.emoji}</span>}
            <span>{it.text}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ================ COIN SHOWER ================ */

function CoinShower() {
  const [bursts, setBursts] = useState([]);
  useEffect(() => FxBus.onCoins((b) => {
    const id = Math.random();
    setBursts(s => [...s, { id, count: b?.count || 18 }]);
    setTimeout(() => setBursts(s => s.filter(x => x.id !== id)), 2200);
  }), []);
  const COINS = ['💶','💰','✨','🪙','💸'];
  return (
    <div className="fixed inset-0 pointer-events-none z-[55] overflow-hidden">
      {bursts.flatMap(b => Array.from({length: b.count}, (_, i) => {
        const left = Math.random() * 100;
        const delay = Math.random() * 0.5;
        const dur = 1.1 + Math.random() * 0.9;
        const size = 26 + Math.random() * 18;
        const emoji = COINS[i % COINS.length];
        return (
          <div key={`${b.id}-${i}`}
            className="absolute coin-drop"
            style={{
              left: left + '%', top: '-60px',
              fontSize: size + 'px',
              animationDelay: delay + 's',
              animationDuration: dur + 's',
            }}
          >{emoji}</div>
        );
      }))}
    </div>
  );
}

/* ================ CENTERED REWARD BURST ================ */

function BurstLayer() {
  const [items, setItems] = useState([]);
  useEffect(() => FxBus.onBurst((b) => {
    const id = Math.random();
    setItems(s => [...s, { id, ...b }]);
    setTimeout(() => setItems(s => s.filter(x => x.id !== id)), 1700);
  }), []);
  return (
    <div className="fixed inset-0 pointer-events-none z-[68] grid place-items-center">
      {items.map(it => (
        <React.Fragment key={it.id}>
          <div
            className="absolute ring-expand rounded-full border-solid border-brand-400"
            style={{ left: '50%', top: '50%', width: '180px', height: '180px', borderColor: it.color || '#2f9b62' }}
          />
          <div
            className="absolute burst-pop"
            style={{ left: '50%', top: '50%' }}
          >
            <div className="bg-white rounded-3xl px-7 py-5 md:px-10 md:py-7 shadow-2xl border-4 border-brand-300 text-center">
              {it.emoji && <div className="text-5xl md:text-6xl mb-1">{it.emoji}</div>}
              <div className="font-display font-black text-brand-900 text-3xl md:text-5xl big-num">{it.value}</div>
              {it.label && <div className="text-brand-700 font-semibold text-sm md:text-base mt-1">{it.label}</div>}
            </div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ================ ANIMATED NUMBER ================ */

function useAnimatedNumber(target, duration = 700) {
  const [val, setVal] = useState(target);
  const currentRef = useRef(target);
  useEffect(() => {
    const from = currentRef.current;
    const to = target;
    if (from === to) return;
    const t0 = performance.now();
    let raf;
    const step = (now) => {
      const t = Math.min(1, (now - t0) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = from + (to - from) * eased;
      currentRef.current = v;
      setVal(v);
      if (t < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return val;
}

function AnimatedNumber({ value, format = (v) => Math.round(v).toString(), className = "" }) {
  const v = useAnimatedNumber(value);
  const [pulse, setPulse] = useState(false);
  const prevRef = useRef(value);
  useEffect(() => {
    if (value !== prevRef.current) {
      setPulse(true);
      const t = setTimeout(() => setPulse(false), 600);
      prevRef.current = value;
      return () => clearTimeout(t);
    }
  }, [value]);
  return <span className={`big-num inline-block ${pulse ? 'num-pop' : ''} ${className}`}>{format(v)}</span>;
}

const SCENES = [

// 5-year projection (city scale, €1,000s)
const FIVE_YEAR = [
  { year: 0, label: "Start",  cum: -2000 },
  { year: 1, label: "Y1",     cum: -1600 },
  { year: 2, label: "Y2",     cum:  -800 },
  { year: 3, label: "Y3",     cum:   500 },
  { year: 4, label: "Y4",     cum:  2300 },
  { year: 5, label: "Y5",     cum:  4200 },
];

const nf = (n) => {
  if (n === undefined || n === null) return "";
  if (Math.abs(n) >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,"") + "M";
  if (Math.abs(n) >= 1_000)     return (n/1_000).toFixed(n>=10_000?0:1).replace(/\.0$/,"") + "k";
  return n.toString();
};

function Btn({ children, onClick, variant = "primary", big = false, disabled = false, silent = false }) {
  const base = "rounded-2xl font-display font-semibold transition-all inline-flex items-center gap-2";
  const size = big ? "px-7 py-4 text-lg" : "px-5 py-3 text-base";
  const cls = variant === "secondary" ? "btn-secondary" : variant === "ghost" ? "btn-ghost" : "btn-primary";
  const handle = (e) => {
    if (!silent) { SoundFX.unlock(); SoundFX.click(); }
    onClick && onClick(e);
  };
  return <button disabled={disabled} onClick={handle} className={`${base} ${size} ${cls} ${disabled?"opacity-50 cursor-not-allowed":""}`}>{children}</button>;
}

function Chip({ icon, value }) {
  return (
    <div className="chip hidden md:inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-sm font-bold">
      <span>{icon}</span>
      <span className="big-num">{value}</span>

  );
}

// Big animated HUD stat — the number counts up smoothly and the chip flashes
// a green ring when the value increases.
function StatChip({ icon, label, value, format, tone = "brand" }) {
  const ref = useRef(null);
  const prevRef = useRef(value);
  useEffect(() => {
    if (value > prevRef.current && ref.current) {
      ref.current.classList.remove('chip-flash');
      void ref.current.offsetWidth; // restart animation
      ref.current.classList.add('chip-flash');
    }
    prevRef.current = value;
  }, [value]);
  const bg = tone === "warm" ? "bg-warm-50 border-warm-200 text-warm-500"
           : tone === "plain" ? "bg-white border-brand-100 text-brand-800"
           : "bg-brand-50 border-brand-200 text-brand-800";
  return (
    <div ref={ref} className={`inline-flex items-center gap-1 sm:gap-1.5 px-2 sm:px-2.5 md:px-3 py-1 sm:py-1.5 rounded-full border-2 ${bg} font-bold`}>
      <span className="text-sm sm:text-base md:text-lg leading-none">{icon}</span>
      <span className="big-num font-display text-xs sm:text-sm md:text-base">
        <AnimatedNumber value={value} format={format}/>
      </span>
      {label && <span className="hidden lg:inline text-xs opacity-70 font-semibold">{label}</span>}
    </div>
  );
}

function Fact({icon,label,value,sub, accent="brand"}) {

function Confetti({ show }) {

function SortingScene({ onComplete }) {
  const [queue] = useState(() => [...SORTING_ITEMS].sort(() => Math.random() - 0.5));
  const [idx, setIdx] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [shake, setShake] = useState(null);
  const [locked, setLocked] = useState(false);
  const current = queue[idx];

  const handle = (bin) => {
    if (locked || !current) return;
    setLocked(true);
    if (bin === current.correct) {
      const newStreak = streak + 1;
      setCorrect(c => c + 1);
      setStreak(newStreak);
      setBestStreak(b => Math.max(b, newStreak));
      SoundFX.correct(newStreak);
      if (newStreak >= 3) setTimeout(() => SoundFX.sparkle(), 220);

      // Visual reward: a small gain popup near the bin you tapped
      const xPct = bin === "compost" ? 28 : 72;
      pingGain({ text: "+€0.10", emoji: "💶", tone: "money",  xPct, yPct: 62 });
      pingGain({ text: "+1", emoji: "🌟", tone: "points", xPct: xPct + 6, yPct: 56, delay: 120 });
      if (newStreak >= 3) {
        pingGain({ text: `🔥 ${newStreak}x`, emoji: "✨", tone: "planet", xPct: 50, yPct: 30, delay: 260 });
      }

      setFeedback({ ok: true, msg: newStreak >= 3 ? `🔥 ${newStreak}x combo! ${current.info}` : `✓ ${current.info}` });
    } else {
      setStreak(0);
      SoundFX.wrong();
      setFeedback({ ok: false, msg: `✗ Oops! ${current.info}` });
      setShake(bin);
      setTimeout(() => setShake(null), 400);
    }
    setTimeout(() => {
      setFeedback(null);
      setIdx(i => i + 1);
      setLocked(false);
    }, 900);
  };

  useEffect(() => {
    if (idx >= queue.length) {
      const pct = Math.round((correct / queue.length) * 100);
      if (pct === 100) {
        SoundFX.win();
        FxBus.coins({ count: 22 });
        FxBus.burst({ value: "Perfect!", label: "Clean batch = full rebate", emoji: "🏆" });
      } else if (pct >= 75) {
        SoundFX.chime();
        FxBus.burst({ value: `${correct}/${queue.length}`, label: "Clean enough to compost", emoji: "🎉" });
      } else {
        SoundFX.chime();
      }
    }
  }, [idx, queue.length, correct]);

  if (idx >= queue.length) {
    const pct = Math.round((correct / queue.length) * 100);
    const result =
      pct === 100 ? { emoji: "🏆", msg: "Perfect! You're a composting champion." } :
      pct >= 75   ? { emoji: "🎉", msg: "Great job — the batch stays clean." } :
                    { emoji: "🤔", msg: "Close! Even one mistake spoils the batch." };
    return (
      <SceneShell chapter={CHAPTER_NAMES.sorting + " — Sort it right"} title="How did you do?">
        <div className="bg-white rounded-3xl p-8 shadow-lg border border-brand-100 text-center">
          <div className="text-7xl mb-3 pop-in">{result.emoji}</div>
          <div className="text-5xl font-display font-bold text-brand-900 big-num pop-in">{correct} / {queue.length}</div>
          <div className="text-lg text-brand-700 mt-2">{result.msg}</div>
          {bestStreak >= 3 && (
            <div className="mt-3 inline-block chip-warm rounded-full px-4 py-1.5 font-bold">
              🔥 Best streak: {bestStreak}
            </div>
          )}
          <div className="mt-6 p-4 rounded-2xl bg-brand-50 border border-brand-200 text-brand-800 text-sm">
            💡 This is the <strong>real value of Green Points</strong>: it rewards clean sorting. Contaminated deposits earn nothing — so people sort carefully.
          </div>
          <div className="mt-6">
            <Btn big onClick={() => onComplete(correct)}>Let's deposit it ▶</Btn>
          </div>
        </div>
      </SceneShell>
    );
  }

  return (
    <SceneShell chapter={CHAPTER_NAMES.sorting + " — Sort it right"} title="Tap the right bin." subtitle="Drag? No — just tap. Quick and easy.">
      <div className="bg-white rounded-3xl p-6 md:p-8 shadow-lg border border-brand-100 relative">
        <div className="flex items-center justify-between mb-4 text-sm">
          <div className="font-bold text-brand-700">Item {idx+1} of {queue.length}</div>
          <div className="flex items-center gap-2">
            {streak >= 2 && (
              <span className="chip-warm rounded-full px-3 py-1 font-bold text-xs pop-in">🔥 {streak}x combo</span>
            )}
            <span className="chip rounded-full px-3 py-1 font-bold text-xs">✓ {correct}</span>
          </div>
        </div>
        <div className="h-2 w-full bg-brand-100 rounded-full overflow-hidden mb-6">
          <div className="h-full bg-brand-500 prog-fill" style={{width: `${(idx / queue.length) * 100}%`}}/>
        </div>

/* ================ 5-YEAR CHART ================ */

function FiveYearChart() {
  const W = 680, H = 280, P = 44;
  const ys = FIVE_YEAR.map(d => d.cum);
  const minY = Math.min(...ys, 0);
  const maxY = Math.max(...ys, 0);
  const range = (maxY - minY) || 1;
  const xStep = (W - P*2) / (FIVE_YEAR.length - 1);
  const yFor = (v) => P + (maxY - v) / range * (H - P*2);
  const xFor = (i) => P + i * xStep;
  const path = FIVE_YEAR.map((d,i) => (i===0?"M":"L") + xFor(i) + "," + yFor(d.cum)).join(" ");
  const zeroY = yFor(0);

  return (
    <div className="bg-white rounded-3xl p-4 md:p-6 shadow-lg border border-brand-100 overflow-x-auto">
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" style={{minWidth: 520}}>
        <defs>
          <linearGradient id="grad-pos" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#2f9b62" stopOpacity="0.5"/>
            <stop offset="100%" stopColor="#2f9b62" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0.25,0.5,0.75,1].map(t => (
          <line key={t} x1={P} x2={W-P} y1={P + t*(H-P*2)} y2={P + t*(H-P*2)} stroke="#e6ebe7" strokeDasharray="3 4"/>
        ))}
        <line x1={P} x2={W-P} y1={zeroY} y2={zeroY} stroke="#174f35" strokeOpacity="0.3" strokeWidth="1.5"/>
        <text x={W-P+2} y={zeroY-4} fontSize="11" fill="#174f35" opacity="0.7">€0 — break even</text>

        <path
          d={`${path} L ${xFor(FIVE_YEAR.length-1)},${zeroY} L ${xFor(0)},${zeroY} Z`}
          fill="url(#grad-pos)"
          opacity="0.8"
        />
        <path d={path} fill="none" stroke="#1f7d4d" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" className="dash-draw"/>

        {FIVE_YEAR.map((d,i) => (
          <g key={i}>
            <circle cx={xFor(i)} cy={yFor(d.cum)} r="6" fill="#fff" stroke="#1f7d4d" strokeWidth="2.5"/>
            <text x={xFor(i)} y={H-P+20} fontSize="12" textAnchor="middle" fill="#174f35" fontWeight="700">{d.label}</text>
            <text x={xFor(i)} y={yFor(d.cum) - 14} fontSize="12" textAnchor="middle" fill={d.cum < 0 ? "#b04a2a" : "#1a6340"} fontWeight="800">
              {d.cum < 0 ? "-" : "+"}€{nf(Math.abs(d.cum*1000))}
            </text>
          </g>
        ))}
        <text x={P} y={P-10} fontSize="12" fill="#174f35" fontWeight="800">Money saved by the city (cumulative)</text>
      </svg>
    </div>
  );
}

          <div className="text-xs uppercase opacity-80 font-bold tracking-wider mb-2">🎯 Our ask</div>
          <div className="text-3xl md:text-4xl font-display font-bold mb-3">Support Green Points.</div>
          <p className="text-white/95 text-lg mb-5">
            A <strong>lower bill</strong> for every family. A <strong>greener park</strong> for every neighborhood. A <strong>cleaner city</strong> that saves millions. All starting with one school project.
          </p>
          <div className="grid sm:grid-cols-3 gap-3 text-center mb-5">
            <div className="bg-white/15 rounded-2xl p-3">
              <div className="text-xs uppercase opacity-80 font-bold">Start small</div>
              <div className="text-2xl font-display font-bold">1 school</div>
            </div>
            <div className="bg-white/15 rounded-2xl p-3">
              <div className="text-xs uppercase opacity-80 font-bold">Break even</div>
              <div className="text-2xl font-display font-bold">Year 3</div>
            </div>
            <div className="bg-white/15 rounded-2xl p-3">
              <div className="text-xs uppercase opacity-80 font-bold">Year-5 savings</div>
              <div className="text-2xl font-display font-bold">+€4.2M</div>
            </div>
          </div>
          <div className="flex flex-wrap gap-3 items-center">
            <div className="bg-white text-brand-800 rounded-2xl px-6 py-3 font-display font-bold text-lg shadow-lg">
              🗳️ Vote Green Points in the marketplace
            </div>
            <Btn variant="secondary" onClick={onRestart}>
              <span>Replay the story</span> <span>↺</span>
            </Btn>
          </div>
        </div>

        <div className="mt-8 text-center text-brand-900/60 text-sm">
          Thank you for playing. 🌿
        </div>
      </div>
    </div>
  );
}

/* ================ APP ================ */

function App() {
  const [idx, setIdx] = useState(0);
  const [stats, setStats] = useState({ points: 0, rebate: 0, kg: 0, sortingScore: null });
  const [muted, setMuted] = useState(false);
  const historyRef = useRef([]);

  const toggleMute = useCallback(() => {
    setMuted(m => {
      const nm = !m;
      SoundFX.setMuted(nm);
      if (!nm) { SoundFX.unlock(); SoundFX.click(); }
      return nm;
    });
  }, []);

  const next = useCallback(() => {
    SoundFX.unlock();
    SoundFX.whoosh();
    setIdx(i => {
      historyRef.current.push(i);
      return Math.min(i + 1, SCENES.length - 1);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const back = useCallback(() => {
    SoundFX.unlock();
    SoundFX.back();
    setIdx(i => {
      if (historyRef.current.length === 0) return i;
      return historyRef.current.pop();
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const restart = useCallback(() => {
    SoundFX.unlock();
    SoundFX.pop();
    historyRef.current = [];
    setIdx(0);
    setStats({ points: 0, rebate: 0, kg: 0, sortingScore: null });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const addEarn = useCallback((delta, overwrite = false) => {
    setStats(s => overwrite
      ? ({ ...s, points: delta.points, rebate: delta.rebate, kg: delta.kg })
      : ({
          ...s,
          points: s.points + (delta.points || 0),
          rebate: +((s.rebate + (delta.rebate || 0)).toFixed(2)),
          kg: s.kg + (delta.kg || 0)
        })
    );
  }, []);

  // Keyboard navigation
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); back(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [next, back]);

  const scene = SCENES[idx];
  const canGoBack = historyRef.current.length > 0;

  return (
    <div className="min-h-screen scene-bg">
      <FloatingGainsLayer/>
      <CoinShower/>
      <BurstLayer/>
      {scene !== "title" && (
        <HUD idx={idx} total={SCENES.length} stats={stats} onBack={back} canGoBack={canGoBack} onRestart={restart} muted={muted} onToggleMute={toggleMute}/>
      )}
      {scene === "title"       && <TitleScene onStart={next} muted={muted} onToggleMute={toggleMute}/>}
      {scene === "problem"     && <ProblemScene onNext={next}/>}
      {scene === "family"      && <FamilyScene onNext={next}/>}
      {scene === "idea"        && <IdeaScene onNext={next}/>}
      {scene === "sorting"     && <SortingScene onComplete={(score) => { setStats(s => ({...s, sortingScore: score})); next(); }}/>}
      {scene === "deposit"     && <DepositScene onNext={next} onEarn={addEarn}/>}
      {scene === "spread"      && <SpreadScene onNext={next} onEarn={(d,o) => addEarn(d,o)}/>}
      {scene === "mayor"       && <MayorScene onNext={next}/>}
      {scene === "projection"  && <ProjectionScene onNext={next}/>}
      {scene === "winners"     && <WinnersScene onNext={next}/>}
      {scene === "green_city"  && <GreenCityScene onRestart={restart}/>}

      <footer className="max-w-6xl mx-auto px-4 py-6 text-center text-brand-900/50 text-sm">
        <div className="divider-dots h-3 mb-3 opacity-40"/>
        Green Points · a marketplace-voting pitch · numbers are Dutch-market estimates
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
